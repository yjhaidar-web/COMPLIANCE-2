<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPLIANCE - YONGJIN 3</title>
    <style>
        /* Pengaturan Dasar Halaman */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Efek background blur samar mirip di gambar */
            background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), 
                        url(background.jpg.png) no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Utama */
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Judul Utama Atas */
        .main-title {
            color: #ffffff;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        /* Kotak Transparan (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Nama Kontak */
        .name {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* Nomor Telepon Teks */
        .phone-number {
            color: #e0e0e0;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* Tombol Hijau WhatsApp */
        .btn-whatsapp {
            display: inline-block;
            background-color: #1cbd5d;
            color: white;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 10px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Efek saat tombol ditekan/disentuh */
        .btn-whatsapp:active {
            transform: scale(0.98);
            background-color: #16994a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">COMPLIANCE - YONGJIN 3</h1>

        <div class="card">
            <div class="name">Chaidar - Safety Officer</div>
            <div class="phone-number">+62 819-3658-4984</div>
            <a href="https://wa.me/6181936584984" target="_blank" class="btn-whatsapp">Hubungi via WhatsApp</a>
        </div>

        <div class="card">
            <div class="name">Yudha - Fire Expert</div>
            <div class="phone-number">+62 857-7180-7899</div>
            <a href="https://wa.me/6285771807899" target="_blank" class="btn-whatsapp">Hubungi via WhatsApp</a>
        </div>

        <div class="card">
            <div class="name">Novia - Technical Compliance</div>
            <div class="phone-number">+62 852-1997-0097</div>
            <a href="https://wa.me/6285219970097" target="_blank" class="btn-whatsapp">Hubungi via WhatsApp</a>
        </div>
    </div>

</body>
</html>
